<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NBA GAME CENTER | 火箭 VS 掘金</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* 通用配色 */
            --bg-dark: #050505;
            --bg-card: rgba(255, 255, 255, 0.03);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --accent-glow: rgba(206, 17, 65, 0.3);
            
            /* 动态球队配色（将通过 JS 设置）*/
            --team1-color: #CE1141;
            --team2-color: #0E2240;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--text-primary);
            position: relative;
        }

        /* 动态背景网格 */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* 顶部导航 */
        .nav-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(5,5,5,0.9), transparent);
            backdrop-filter: blur(10px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            object-fit: contain;
            filter: drop-shadow(0 2px 8px rgba(255, 255, 255, 0.3));
            transition: transform 0.3s ease;
        }

        .logo:hover .logo-img {
            transform: scale(1.1) rotate(5deg);
        }

        .logo span {
            background: linear-gradient(135deg, var(--team1-color), var(--team2-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            animation: pulse 2s infinite;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #ff0000;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); }
        }

        /* 主容器 */
        .game-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 100px 20px 40px;
            overflow: auto;
        }

        /* 比赛信息 */
        .game-info {
            text-align: center;
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeInUp 0.8s ease forwards;
        }

        .game-type {
            font-size: 12px;
            letter-spacing: 3px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .game-date {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: var(--nuggets-gold);
            letter-spacing: 2px;
        }

        /* 比分板 */
        .scoreboard {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            perspective: 1000px;
            position: relative;
        }
        
        .scoreboard > .team-wrapper {
            flex: 1;
            max-width: 280px;
            position: relative;
        }

        /* 球队卡片 */
        .team-card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 30px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            transform: translateY(50px);
        }

        .team-card.active {
            opacity: 1;
            transform: translateY(0);
        }

        /* 球队1样式 */
        .team-card.team1 {
            border-color: rgba(255, 255, 255, 0.3);
        }

        .team-card.team1::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--team1-color);
        }

        .team-card.team1.winner {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05));
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.3), inset 0 0 60px rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        /* 球队2样式 */
        .team-card.team2 {
            border-color: rgba(255, 255, 255, 0.3);
        }

        .team-card.team2::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--team2-color);
        }

        .team-card.team2.winner {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.05));
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.3), inset 0 0 60px rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        /* 球队Logo容器 */
        .logo-wrapper {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
        }

        .logo-glow {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            filter: blur(30px);
            opacity: 0.5;
            transition: all 0.4s ease;
        }

        .team1 .logo-glow {
            background: var(--team1-color);
        }

        .team2 .logo-glow {
            background: var(--team2-color);
        }

        .team-card.winner .logo-glow {
            opacity: 0.8;
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 0.4; }
        }

        .team-logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            transition: transform 0.4s ease;
        }

        .team-card:hover .team-logo {
            transform: scale(1.1) rotate(5deg);
        }

        /* 球队名称 */
        .team-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* 比分数字 */
        .score-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 64px;
            font-weight: 900;
            line-height: 1;
            position: relative;
            display: inline-block;
        }

        .team1 .score-display {
            color: var(--team1-color);
            text-shadow: 0 0 30px var(--team1-color);
        }

        .team2 .score-display {
            color: var(--team2-color);
            text-shadow: 0 0 30px var(--team2-color);
        }

        .score-change {
            position: absolute;
            top: -10px;
            right: -20px;
            font-size: 14px;
            color: #00ff88;
            opacity: 0;
            animation: scorePopup 0.5s ease forwards;
            animation-delay: 2s;
        }

        @keyframes scorePopup {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* VS 分隔符 */
        .vs-divider {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            opacity: 0;
            animation: fadeIn 1s ease 0.5s forwards;
        }

        .vs-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--team1-color), var(--team2-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 4px;
        }

        .vs-line {
            width: 2px;
            height: 60px;
            background: linear-gradient(to bottom, var(--team1-color), var(--team2-color));
            opacity: 0.5;
        }

        /* 获胜标识 */
        .winner-badge {
            position: absolute;
            top: 0;
            left: 79%;
            transform: translateX(-50%) translateY(-100%);
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            opacity: 0;
            animation: badgeDrop 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
            animation-delay: 1.5s;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
            z-index: 10;
        }

        @keyframes badgeDrop {
            0% { transform: translateX(-50%) translateY(-100%); opacity: 0; }
            100% { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        /* 比赛状态 */
        .game-status {
            text-align: center;
            margin-top: 30px;
            opacity: 0;
            animation: fadeInUp 0.8s ease 1s forwards;
        }

        .status-text {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .status-text.final {
            background: rgba(0, 255, 136, 0.1);
            border-color: rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        /* 统计数据 */
        .stats-container {
            max-width: 600px;
            margin: 40px auto 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            opacity: 0;
            animation: fadeInUp 0.8s ease 1.2s forwards;
        }

        .stat-box {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        /* 动画定义 */
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 粒子效果 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .nav-header {
                padding: 15px 20px;
            }

            .logo {
                font-size: 18px;
            }

            .logo-img {
                width: 32px;
                height: 32px;
            }

            .game-container {
                padding: 80px 15px 30px;
            }

            .scoreboard {
                flex-direction: column;
                gap: 30px;
            }

            .team-card {
                max-width: 100%;
                width: 100%;
                padding: 25px 20px;
            }

            .vs-divider {
                flex-direction: row;
                gap: 15px;
            }

            .vs-line {
                width: 60px;
                height: 2px;
            }

            .score-display {
                font-size: 48px;
            }

            .logo-wrapper {
                width: 100px;
                height: 100px;
            }

            .stats-container {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .stat-box {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 15px 20px;
            }

            .stat-label {
                margin-bottom: 0;
            }
        }

        /* 横屏模式 */
        @media (max-width: 768px) and (orientation: landscape) {
            .scoreboard {
                flex-direction: row;
            }

            .team-card {
                max-width: 45%;
            }

            .vs-divider {
                flex-direction: column;
            }

            .vs-line {
                width: 2px;
                height: 40px;
            }
        }

        /* 配置输入框 */
        .config-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 5, 0.95);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .config-modal.hidden {
            display: none;
        }

        .config-container {
            background: linear-gradient(135deg, rgba(14, 34, 64, 0.8), rgba(206, 17, 65, 0.3));
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            overflow: auto;
            height: 80vh;
        }

        .config-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 900;
            text-align: center;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .config-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .form-input, .form-select {
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #FFD700;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }

        .form-select {
            cursor: pointer;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .team-section {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            margin-top: 10px;
        }

        .team-section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #FFD700;
            letter-spacing: 1px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .form-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #FFD700;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .config-button {
            flex: 1;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .config-button.primary {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: white;
            box-shadow: 0 4px 20px rgba(255, 215, 0, 0.4);
        }

        .config-button.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(255, 215, 0, 0.6);
        }

        .config-button.secondary {
            background: linear-gradient(135deg, #4A90E2, #357ABD);
            color: white;
            box-shadow: 0 4px 20px rgba(74, 144, 226, 0.4);
        }

        .config-button.secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(74, 144, 226, 0.6);
        }

        /* 加载动画 */
        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-logo {
            width: 120px;
            height: 120px;
            position: relative;
            animation: logoFloat 2s ease-in-out infinite;
        }

        .loader-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.5));
        }

        @keyframes logoFloat {
            0%, 100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-20px) scale(1.05);
            }
        }

        .loader-ball {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            letter-spacing: 4px;
            color: var(--text-secondary);
            animation: textPulse 1.5s ease-in-out infinite;
        }

        @keyframes textPulse {
            0%, 100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        /* 数字滚动动画 */
        .count-up {
            animation: countUp 2s ease-out forwards;
        }

        @keyframes countUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 皇冠样式 */
        .crown {
            position: absolute;
            top: -42px;
            left: 60%;
            transform: translateX(-50%) rotate(30deg);
            font-size: 72px;
            opacity: 0;
            z-index: 10;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8));
        }

        .crown.fly-in {
            animation: crownFly 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        }

        @keyframes crownFly {
            0% {
                opacity: 0;
                transform: translate(-50%, 300px) scale(0.3) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -100px) scale(1.3) rotate(180deg);
            }
            70% {
                transform: translate(-50%, 20px) scale(0.9) rotate(340deg);
            }
            85% {
                transform: translate(-50%, -10px) scale(1.1) rotate(360deg);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, 0) scale(1) rotate(380deg);
            }
        }

        @keyframes crownGlow {
            0%, 100% {
                filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8));
            }
            50% {
                filter: drop-shadow(0 0 30px rgba(255, 215, 0, 1));
            }
        }

        .crown.fly-in {
            animation: crownFly 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards,
                       crownGlow 2s ease-in-out 1.5s infinite;
        }
    </style>
</head>
<body>
    <!-- 配置输入框 -->
    <div class="config-modal" id="configModal">
        <div class="config-container">
            <div class="config-title">比赛配置</div>
            <form class="config-form" id="configForm">
                <div class="form-group">
                    <label class="form-label">比赛类型</label>
                    <input type="text" class="form-input" id="gameType" value="Regular Season" placeholder="例如: Regular Season, Playoffs">
                </div>

                <div class="form-group">
                    <label class="form-label">比赛日期</label>
                    <input type="text" class="form-input" id="gameDate" value="MARCH 4, 2026" placeholder="例如: MARCH 4, 2026">
                </div>

                <div class="team-section">
                    <div class="team-section-title">主队信息</div>
                    <div class="form-group">
                        <label class="form-label">球队名称</label>
                        <select class="form-select" id="team1Name">
                            <option value="">选择球队...</option>

    <!-- 加载画面 -->

    <!-- 导航 -->
    <nav class="nav-header">

    <!-- 主内容 -->
    <main class="game-container">
        <!-- 比赛信息 -->
        <div class="game-info">
            <div class="game-type">Regular Season</div>
            <div class="game-date">MARCH 4, 2026</div>
        </div>

        <!-- 比分板 -->
        <div class="scoreboard">
            <!-- 球队1 -->
            <div class="team-wrapper" id="team1-wrapper">
                <div class="team-card team1" id="team1">

    <script>
        // ========== NBA 球队数据库 ==========
        const nbaTeams = [
            { name: 'Atlanta Hawks', shortName: 'Hawks', color: '#E03A3E', logo: 'img/nba_logo/NBA_LOGO_1_Atlanta Hawks Transparent Logo.png' },
            { name: 'Boston Celtics', shortName: 'Celtics', color: '#007A33', logo: 'img/nba_logo/NBA_LOGO_2_Boston Celtics Transparent Logo.png' },
            { name: 'Brooklyn Nets', shortName: 'Nets', color: '#000000', logo: 'img/nba_logo/NBA_LOGO_3_Brooklyn Nets Transparent Logo.png' },
            { name: 'Charlotte Hornets', shortName: 'Hornets', color: '#1D1160', logo: 'img/nba_logo/NBA_LOGO_4_Charlotte Hornets Transparent Logo.png' },
            { name: 'Chicago Bulls', shortName: 'Bulls', color: '#CE1141', logo: 'img/nba_logo/NBA_LOGO_5_Chicago Bulls Transparent Logo.png' },
            { name: 'Cleveland Cavaliers', shortName: 'Cavaliers', color: '#860038', logo: 'img/nba_logo/NBA_LOGO_6_Cleveland Cavaliers Transparent Logo.png' },
            { name: 'Dallas Mavericks', shortName: 'Mavericks', color: '#00538C', logo: 'img/nba_logo/NBA_LOGO_7_Dallas Mavericks Transparent Logo.png' },
            { name: 'Denver Nuggets', shortName: 'Nuggets', color: '#0E2240', logo: 'img/nba_logo/NBA_LOGO_8_Denver Nuggets Transparent Logo.png' },
            { name: 'Detroit Pistons', shortName: 'Pistons', color: '#C8102E', logo: 'img/nba_logo/NBA_LOGO_9_Detroit Pistons Transparent Logo.png' },
            { name: 'Golden State Warriors', shortName: 'Warriors', color: '#1D428A', logo: 'img/nba_logo/NBA_LOGO_10_Golden State Warriors Transparent Logo.png' },
            { name: 'Houston Rockets', shortName: 'Rockets', color: '#CE1141', logo: 'img/nba_logo/NBA_LOGO_11_Houston Rockets Transparent Logo.png' },
            { name: 'Indiana Pacers', shortName: 'Pacers', color: '#002D62', logo: 'img/nba_logo/NBA_LOGO_12_Indiana Pacers Transparent Logo.png' },
            { name: 'Los Angeles Lakers', shortName: 'Lakers', color: '#552583', logo: 'img/nba_logo/NBA_LOGO_14_Los Angeles Lakers Transparent Logo.png' },
            { name: 'Memphis Grizzlies', shortName: 'Grizzlies', color: '#5D76A9', logo: 'img/nba_logo/NBA_LOGO_15_Memphis Grizzlies Transparent Logo.png' },
            { name: 'Miami Heat', shortName: 'Heat', color: '#98002E', logo: 'img/nba_logo/NBA_LOGO_16_Miami Heat Transparent Logo.png' },
            { name: 'Milwaukee Bucks', shortName: 'Bucks', color: '#00471B', logo: 'img/nba_logo/NBA_LOGO_17_Milwaukee Bucks Transparent Logo.png' },
            { name: 'Minnesota Timberwolves', shortName: 'Timberwolves', color: '#0C2340', logo: 'img/nba_logo/NBA_LOGO_18_Minnesota Timberwolves Transparent Logo.png' },
            { name: 'New Orleans Pelicans', shortName: 'Pelicans', color: '#0C2340', logo: 'img/nba_logo/NBA_LOGO_19_New Orleans Pelicans Transparent Logo.png' },
            { name: 'New York Knicks', shortName: 'Knicks', color: '#006BB6', logo: 'img/nba_logo/NBA_LOGO_20_New York Knicks Transparent Logo.png' },
            { name: 'Oklahoma City Thunder', shortName: 'Thunder', color: '#007AC1', logo: 'img/nba_logo/NBA_LOGO_21_Oklahoma City Thunder Transparent Logo.png' },
            { name: 'Orlando Magic', shortName: 'Magic', color: '#0077C0', logo: 'img/nba_logo/NBA_LOGO_22_Orlando Magic Transparent Logo.png' },
            { name: 'Philadelphia 76ers', shortName: '76ers', color: '#006BB6', logo: 'img/nba_logo/NBA_LOGO_23_Philadelphia 76ers Transparent Logo.png' },
            { name: 'Phoenix Suns', shortName: 'Suns', color: '#1D1160', logo: 'img/nba_logo/NBA_LOGO_24_Phoenix Suns Transparent Logo.png' },
            { name: 'Portland Trail Blazers', shortName: 'Trail Blazers', color: '#E03A3E', logo: 'img/nba_logo/NBA_LOGO_25_Portland Trail Blazers Transparent Logo.png' },
            { name: 'Sacramento Kings', shortName: 'Kings', color: '#5A2D81', logo: 'img/nba_logo/NBA_LOGO_26_Sacramento Kings Transparent Logo.png' },
            { name: 'San Antonio Spurs', shortName: 'Spurs', color: '#C4CED4', logo: 'img/nba_logo/NBA_LOGO_27_San Antonio Spurs Transparent Logo.png' },
            { name: 'Toronto Raptors', shortName: 'Raptors', color: '#CE1141', logo: 'img/nba_logo/NBA_LOGO_28_Toronto Raptors Transparent Logo.png' },
            { name: 'Utah Jazz', shortName: 'Jazz', color: '#002B5C', logo: 'img/nba_logo/NBA_LOGO_29_Utah Jazz Transparent Logo.png' },
            { name: 'Washington Wizards', shortName: 'Wizards', color: '#002B5C', logo: 'img/nba_logo/NBA_LOGO_30_Washington Wizards Transparent Logo.png' }
        ];

        // 根据球队名称查找球队信息
        function getTeamByName(teamName) {
            return nbaTeams.find(team => 
                team.name.toLowerCase().includes(teamName.toLowerCase()) || 
                team.shortName.toLowerCase().includes(teamName.toLowerCase())
            );
        }

        // ========== 比赛配置（只需修改这里）==========
        let gameConfig = {
            gameType: 'Regular Season',        // 比赛类型
            gameDate: 'MARCH 4, 2026',         // 比赛日期
            team1: {
                teamName: 'Houston Rockets',  // 从 nbaTeams 中查找
                score: 120,
                isWinner: true
            },
            team2: {
                teamName: 'Denver Nuggets',    // 从 nbaTeams 中查找
                score: 115,
                isWinner: false
            }
        };

        // 初始化配置表单
        function initConfigForm() {
            const team1Select = document.getElementById('team1Name');
            const team2Select = document.getElementById('team2Name');

            // 填充球队选项
            nbaTeams.forEach(team => {
                const option1 = document.createElement('option');
                option1.value = team.name;
                option1.textContent = team.name;
                team1Select.appendChild(option1);

                const option2 = document.createElement('option');
                option2.value = team.name;
                option2.textContent = team.name;
                team2Select.appendChild(option2);
            });

            // 设置默认值
            team1Select.value = 'Houston Rockets';
            team2Select.value = 'Denver Nuggets';

            // 获胜者复选框互斥
            const team1WinnerCheckbox = document.getElementById('team1Winner');
            const team2WinnerCheckbox = document.getElementById('team2Winner');

            team1WinnerCheckbox.addEventListener('change', () => {
                if (team1WinnerCheckbox.checked) {
                    team2WinnerCheckbox.checked = false;
                }
            });

            team2WinnerCheckbox.addEventListener('change', () => {
                if (team2WinnerCheckbox.checked) {
                    team1WinnerCheckbox.checked = false;
                }
            });
        }

        // 从表单获取配置
        function getConfigFromForm() {
            return {
                gameType: document.getElementById('gameType').value,
                gameDate: document.getElementById('gameDate').value,
                team1: {
                    teamName: document.getElementById('team1Name').value,
                    score: parseInt(document.getElementById('team1Score').value),
                    isWinner: document.getElementById('team1Winner').checked
                },
                team2: {
                    teamName: document.getElementById('team2Name').value,
                    score: parseInt(document.getElementById('team2Score').value),
                    isWinner: document.getElementById('team2Winner').checked
                }
            };
        }

        // 自动填充完整的球队信息
        function initTeamData() {
            const team1Info = getTeamByName(gameConfig.team1.teamName);
            const team2Info = getTeamByName(gameConfig.team2.teamName);

            if (team1Info) {
                gameConfig.team1 = {
                    ...gameConfig.team1,
                    name: team1Info.name.toUpperCase(),
                    shortName: team1Info.shortName,
                    logo: team1Info.logo,
                    color: team1Info.color
                };
            }

            if (team2Info) {
                gameConfig.team2 = {
                    ...gameConfig.team2,
                    name: team2Info.name.toUpperCase(),
                    shortName: team2Info.shortName,
                    logo: team2Info.logo,
                    color: team2Info.color
                };
            }
        }

        // 初始化页面数据
        function initGameData() {
            // 设置动态球队颜色
            document.documentElement.style.setProperty('--team1-color', gameConfig.team1.color);
            document.documentElement.style.setProperty('--team2-color', gameConfig.team2.color);
            
            // 更新比赛信息
            document.querySelector('.game-type').textContent = gameConfig.gameType;
            document.querySelector('.game-date').textContent = gameConfig.gameDate;
            
            // 更新球队1
            const team1Card = document.getElementById('team1');
            team1Card.querySelector('.team-logo').src = gameConfig.team1.logo;
            team1Card.querySelector('.team-logo').alt = gameConfig.team1.shortName;
            team1Card.querySelector('.team-name').textContent = gameConfig.team1.name;
            team1Card.querySelector('.score-display').setAttribute('data-score', gameConfig.team1.score);
            
            // 更新球队2
            const team2Card = document.getElementById('team2');
            team2Card.querySelector('.team-logo').src = gameConfig.team2.logo;
            team2Card.querySelector('.team-logo').alt = gameConfig.team2.shortName;
            team2Card.querySelector('.team-name').textContent = gameConfig.team2.name;
            team2Card.querySelector('.score-display').setAttribute('data-score', gameConfig.team2.score);
            
            // 设置获胜者
            if (gameConfig.team1.isWinner) {
                team1Card.classList.add('winner');
                team2Card.classList.remove('winner');
                const team1Wrapper = document.getElementById('team1-wrapper');
                if (!team1Wrapper.querySelector('.winner-badge')) {
                    const badge = document.createElement('div');
                    badge.className = 'winner-badge';
                    badge.textContent = 'WINNER';
                    team1Wrapper.appendChild(badge);
                }
                document.getElementById('team2-wrapper').querySelector('.winner-badge')?.remove();
            } else if (gameConfig.team2.isWinner) {
                team2Card.classList.add('winner');
                team1Card.classList.remove('winner');
                const team2Wrapper = document.getElementById('team2-wrapper');
                if (!team2Wrapper.querySelector('.winner-badge')) {
                    const badge = document.createElement('div');
                    badge.className = 'winner-badge';
                    badge.textContent = 'WINNER';
                    team2Wrapper.appendChild(badge);
                }
                document.getElementById('team1-wrapper').querySelector('.winner-badge')?.remove();
            }
        }

        // 启动应用
        async function startApp(shouldRecord = false) {
            // 获取配置
            gameConfig = getConfigFromForm();
            
            // 初始化球队数据
            initTeamData();
            
            // 隐藏配置框
            document.getElementById('configModal').classList.add('hidden');
            
            // 如果需要录屏，先开始录屏，等录屏开始后再显示内容
            if (shouldRecord) {
                try {
                    await startRecording();
                    // 录屏开始后，等待 500ms 再显示内容
                    await new Promise(resolve => setTimeout(resolve, 500));
                } catch (error) {
                    console.error('录屏启动失败:', error);
                    // 即使录屏失败，也继续显示内容
                }
            }
            
            // 显示加载器
            document.getElementById('loader').classList.remove('hidden');
            
            // 初始化数据
            initGameData();
            
            // 隐藏加载器并启动动画
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
                
                // 激活卡片动画
                setTimeout(() => {
                    document.querySelectorAll('.team-card').forEach((card, index) => {
                        setTimeout(() => {
                            card.classList.add('active');
                        }, index * 200);
                    });
                }, 300);

                // 数字滚动动画
                setTimeout(() => {
                    animateScores();
                }, 800);
            }, 1000);
        }

        // 页面加载完成后执行
        window.addEventListener('load', () => {
            // 初始化配置表单
            initConfigForm();
            
            // 绑定按钮事件
            document.getElementById('confirmBtn').addEventListener('click', () => {
                startApp(false);
            });

            document.getElementById('confirmRecordBtn').addEventListener('click', () => {
                startApp(true);
            });
        });

        // 比分滚动动画
        function animateScores() {
            const scoreElements = document.querySelectorAll('.score-display');
            
            scoreElements.forEach(el => {
                const targetScore = parseInt(el.getAttribute('data-score'));
                const duration = 2000;
                const steps = 60;
                const increment = targetScore / steps;
                let current = 0;
                let step = 0;

                const timer = setInterval(() => {
                    step++;
                    current = Math.min(Math.floor(increment * step), targetScore);
                    el.childNodes[0].textContent = current;
                    
                    if (step >= steps) {
                        clearInterval(timer);
                        el.childNodes[0].textContent = targetScore;
                        
                        // 比分动画完成后，添加皇冠
                        setTimeout(() => {
                            addCrownToWinner();
                        }, 300);
                    }
                }, duration / steps);
            });
        }

        // 为获胜队伍添加皇冠
        function addCrownToWinner() {
            const winnerCard = document.querySelector('.team-card.winner');
            if (winnerCard) {
                const winnerId = winnerCard.id;
                const winnerWrapper = document.getElementById(winnerId + '-wrapper');
                
                if (winnerWrapper && !winnerWrapper.querySelector('.crown')) {
                    const crown = document.createElement('div');
                    crown.className = 'crown';
                    crown.textContent = '👑';
                    winnerWrapper.appendChild(crown);
                    
                    // 触发飞入动画
                    setTimeout(() => {
                        crown.classList.add('fly-in');
                    }, 50);
                }
            }
        }

        // 创建粒子效果
        function createParticles() {
            const container = document.getElementById('particles');
            const particleCount = 20;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                
                container.appendChild(particle);
            }
        }

        createParticles();

        // ========== 录屏功能（录制当前标签页）==========
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;

        // 开始录屏
        async function startRecording() {
            if (isRecording) {
                console.log('已在录屏中');
                return Promise.resolve();
            }

            try {
                // 请求录制当前标签页
                const stream = await navigator.mediaDevices.getDisplayMedia({
                    video: {
                        displaySurface: 'browser', // 优先选择浏览器标签页
                        width: { ideal: 1920 },
                        height: { ideal: 1080 },
                        frameRate: { ideal: 30 }
                    },
                    audio: false,
                    preferCurrentTab: true // Chrome 支持优先当前标签页
                });

                recordedChunks = [];
                
                // 检测支持的 MIME 类型
                let mimeType = 'video/webm;codecs=vp9';
                if (!MediaRecorder.isTypeSupported(mimeType)) {
                    mimeType = 'video/webm;codecs=vp8';
                }
                if (!MediaRecorder.isTypeSupported(mimeType)) {
                    mimeType = 'video/webm';
                }

                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: mimeType,
                    videoBitsPerSecond: 2500000
                });

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    
                    // 创建下载链接
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `NBA_Recording_${new Date().getTime()}.webm`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    
                    // 释放资源
                    URL.revokeObjectURL(url);
                    stream.getTracks().forEach(track => track.stop());
                    
                    console.log('录屏已保存');
                };

                // 监听用户手动停止分享
                stream.getVideoTracks()[0].addEventListener('ended', () => {
                    if (isRecording) {
                        stopRecording();
                    }
                });

                mediaRecorder.start();
                isRecording = true;
                console.log('开始录屏当前页面');
                
                // 返回 Promise，表示录屏已成功开始
                return Promise.resolve();

            } catch (error) {
                console.error('录屏失败:', error);
                if (error.name === 'NotAllowedError') {
                    alert('录屏被取消或拒绝');
                } else {
                    alert('录屏失败：' + error.message);
                }
                // 抛出错误，让调用方知道录屏失败
                throw error;
            }
        }

        // 停止录屏
        function stopRecording() {
            if (!isRecording || !mediaRecorder) {
                console.log('当前没有进行录屏');
                return;
            }

            mediaRecorder.stop();
            isRecording = false;
            console.log('停止录屏');
        }

        // 监听键盘事件
        document.addEventListener('keydown', (event) => {
            // Ctrl+A 开始录屏
            if (event.ctrlKey && event.key === 'a') {
                event.preventDefault();
                startRecording();
            }
            
            // Ctrl+S 停止录屏
            if (event.ctrlKey && event.key === 's') {
                event.preventDefault();
                stopRecording();
            }
        });

        console.log('录屏功能已加载：Ctrl+A 开始录屏，Ctrl+S 停止录屏（请在弹窗中选择"此标签页"）');
    </script>
