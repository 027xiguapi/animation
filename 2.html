<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA 星际选秀 | NBA Star Selector</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-blue: #00d4ff;
            --neon-cyan: #00fff9;
            --neon-gold: #ffd700;
            --neon-orange: #ff6b35;
            --dark-bg: #0a0e27;
            --darker-bg: #050817;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            min-height: 100vh;
            background: var(--darker-bg);
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* 动态网格背景 */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: grid-move 20s linear infinite;
            pointer-events: none;
        }

        @keyframes grid-move {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        /* 粒子星空 */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 扫描线效果 */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            animation: scan 4s linear infinite;
            opacity: 0.5;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes scan {
            0% { transform: translateY(-100vh); }
            100% { transform: translateY(100vh); }
        }

        /* 主标题 */
        .header {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 100;
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(180deg, #fff 0%, var(--neon-cyan) 50%, var(--neon-blue) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 8px;
            position: relative;
            text-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        .title::before {
            content: 'NBA STAR SELECTOR';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 255, 249, 0.3) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0%, 100% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-2px, -2px); }
            80% { transform: translate(2px, 2px); }
        }

        .subtitle {
            font-size: 1rem;
            color: var(--neon-cyan);
            letter-spacing: 15px;
            margin-top: 10px;
            opacity: 0.8;
        }

        /* 中央全息投影区域 */
        .hologram-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            perspective: 1000px;
        }

        .hologram-ring {
            position: absolute;
            border: 2px solid rgba(0, 212, 255, 0.3);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotate 10s linear infinite;
        }

        .hologram-ring:nth-child(1) { width: 200px; height: 200px; animation-duration: 8s; border-color: rgba(0, 212, 255, 0.5); }
        .hologram-ring:nth-child(2) { width: 300px; height: 300px; animation-duration: 12s; animation-direction: reverse; border-color: rgba(255, 215, 0, 0.3); }
        .hologram-ring:nth-child(3) { width: 400px; height: 400px; animation-duration: 15s; border-style: dashed; }
        .hologram-ring:nth-child(4) { width: 500px; height: 500px; animation-duration: 20s; animation-direction: reverse; border-color: rgba(0, 255, 249, 0.2); border-width: 1px; }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 球星卡片容器 */
        .cards-orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 450px;
            height: 450px;
            transform: translate(-50%, -50%);
            transition: all 0.5s ease;
        }

        .player-card {
            position: absolute;
            width: 140px;
            height: 180px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(0, 0, 0, 0.8));
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            transform-origin: center;
        }

        .player-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--neon-cyan), transparent, var(--neon-gold));
            border-radius: 15px;
            opacity: 0;
            z-index: -1;
            transition: opacity 0.3s;
        }

        .player-card:hover::before,
        .player-card.active::before {
            opacity: 1;
            animation: border-rotate 3s linear infinite;
        }

        @keyframes border-rotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .player-card.active {
            transform: scale(1.3) !important;
            border-color: var(--neon-gold);
            box-shadow: 
                0 0 30px rgba(255, 215, 0, 0.5),
                0 0 60px rgba(255, 215, 0, 0.3),
                inset 0 0 30px rgba(255, 215, 0, 0.1);
            z-index: 100;
        }

        .player-card.selected {
            transform: scale(1.5) !important;
            border-color: var(--neon-gold);
            box-shadow: 
                0 0 50px rgba(255, 215, 0, 0.8),
                0 0 100px rgba(255, 215, 0, 0.5),
                0 0 150px rgba(255, 215, 0, 0.3);
            animation: winner-pulse 1s ease-in-out infinite;
        }

        @keyframes winner-pulse {
            0%, 100% { box-shadow: 0 0 50px rgba(255, 215, 0, 0.8), 0 0 100px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 80px rgba(255, 215, 0, 1), 0 0 150px rgba(255, 215, 0, 0.8); }
        }

        .card-holo {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 10px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            position: relative;
            overflow: hidden;
        }

        .card-holo::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255, 255, 255, 0.3) 50%,
                transparent 70%
            );
            animation: holo-shine 2s infinite;
        }

        @keyframes holo-shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .card-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            color: #fff;
            text-align: center;
            padding: 0 10px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .card-team {
            font-size: 0.65rem;
            color: var(--neon-cyan);
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .card-number {
            position: absolute;
            top: 5px;
            right: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: rgba(0, 212, 255, 0.5);
        }

        /* 中央核心 */
        .core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--neon-cyan) 0%, transparent 70%);
            opacity: 0.3;
            animation: core-pulse 2s ease-in-out infinite;
        }

        @keyframes core-pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.6; }
        }

        /* 控制面板 */
        .control-panel {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 100;
        }

        .mode-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }

        .mode-btn {
            padding: 8px 20px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            color: var(--neon-cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 5px;
        }

        .mode-btn:hover,
        .mode-btn.active {
            background: rgba(0, 212, 255, 0.3);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        .main-btn {
            padding: 20px 80px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--darker-bg);
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
            border: none;
            border-radius: 50px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
        }

        .main-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: left 0.5s;
        }

        .main-btn:hover::before {
            left: 100%;
        }

        .main-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 40px rgba(0, 212, 255, 0.6);
        }

        .main-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .main-btn.scanning {
            animation: btn-scan 0.5s infinite;
        }

        @keyframes btn-scan {
            0%, 100% { box-shadow: 0 0 30px rgba(0, 212, 255, 0.5); }
            50% { box-shadow: 0 0 50px rgba(0, 255, 249, 0.8), 0 0 80px rgba(0, 212, 255, 0.4); }
        }

        /* 数据面板 */
        .data-panel {
            position: fixed;
            top: 50%;
            right: 50px;
            transform: translateY(-50%);
            width: 250px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--neon-cyan);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            padding-bottom: 10px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.6);
        }

        .stat-value {
            color: var(--neon-gold);
            font-family: 'Orbitron', sans-serif;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-gold));
            width: 0%;
            transition: width 0.3s;
        }

        /* 结果展示 - 全息弹窗 */
        .result-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s;
        }

        .result-modal.show {
            opacity: 1;
            visibility: visible;
        }

        .result-hologram {
            width: 500px;
            height: 600px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(0, 0, 0, 0.9));
            border: 2px solid var(--neon-cyan);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            position: relative;
            transform: scale(0.8) rotateX(10deg);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 
                0 0 50px rgba(0, 212, 255, 0.3),
                inset 0 0 50px rgba(0, 212, 255, 0.1);
        }

        .result-modal.show .result-hologram {
            transform: scale(1) rotateX(0deg);
        }

        .result-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-gold), var(--neon-orange));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin: 0 auto 30px;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.5);
            position: relative;
            animation: avatar-float 3s ease-in-out infinite;
        }

        @keyframes avatar-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .result-avatar::before {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 2px solid var(--neon-gold);
            animation: avatar-ring 2s linear infinite;
        }

        @keyframes avatar-ring {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        .result-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: #fff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .result-team {
            font-size: 1.1rem;
            color: var(--neon-cyan);
            margin-bottom: 30px;
            letter-spacing: 5px;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 10px;
            padding: 15px;
        }

        .stat-number {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--neon-gold);
        }

        .stat-text {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 5px;
            text-transform: uppercase;
        }

        .rarity-badge {
            display: inline-block;
            padding: 8px 25px;
            background: linear-gradient(135deg, var(--neon-gold), var(--neon-orange));
            color: var(--darker-bg);
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            border-radius: 20px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: badge-glow 2s ease-in-out infinite;
        }

        @keyframes badge-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.8); }
        }

        .close-btn {
            padding: 12px 40px;
            background: transparent;
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 25px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .close-btn:hover {
            background: var(--neon-cyan);
            color: var(--darker-bg);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        /* 特效 */
        .energy-burst {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, var(--neon-gold), transparent);
            opacity: 0;
            pointer-events: none;
            z-index: 999;
        }

        .energy-burst.active {
            animation: burst 1s ease-out forwards;
        }

        @keyframes burst {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 200vw; height: 200vw; opacity: 0; }
        }

        /* 扫描特效 */
        .scanner {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border: 2px solid var(--neon-cyan);
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            z-index: 50;
        }

        .scanner.active {
            animation: scanner-pulse 1s ease-out;
        }

        @keyframes scanner-pulse {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
        }

        /* 二进制雨效果 */
        .matrix-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            z-index: 5;
        }

        .matrix-rain.active {
            opacity: 0.1;
        }

        /* 角落装饰 */
        .corner {
            position: fixed;
            width: 100px;
            height: 100px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            z-index: 50;
        }

        .corner-tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .corner-tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .corner-br { bottom: 20px; right: 20px; border-left: none; border-top: none; }

        /* 响应式 */
        @media (max-width: 1200px) {
            .data-panel { display: none; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <!-- 背景效果 -->
    <div class="grid-bg"></div>
    <div class="stars" id="stars"></div>
    <div class="scan-line"></div>
    <canvas class="matrix-rain" id="matrixRain"></canvas>

    <!-- 角落装饰 -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- 特效 -->
    <div class="energy-burst" id="energyBurst"></div>
    <div class="scanner" id="scanner"></div>

    <!-- 标题 -->
    <div class="header">
        <h1 class="title">STAR SELECTOR</h1>
        <div class="subtitle">NBA 星际选秀系统</div>
    </div>

    <!-- 主容器 -->
    <div class="hologram-container">
        <div class="hologram-ring"></div>
        <div class="hologram-ring"></div>
        <div class="hologram-ring"></div>
        <div class="hologram-ring"></div>
        <div class="core"></div>
        <div class="cards-orbit" id="cardsOrbit"></div>
    </div>

    <!-- 数据面板 -->
    <div class="data-panel">
        <div class="panel-title">系统状态</div>
        <div class="stat-row">
            <span class="stat-label">系统状态</span>
            <span class="stat-value" id="systemStatus">待机中</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">扫描进度</span>
            <span class="stat-value" id="scanProgress">0%</span>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="stat-row" style="margin-top: 20px;">
            <span class="stat-label">已选球星</span>
            <span class="stat-value" id="selectedCount">0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">稀有度</span>
            <span class="stat-value" id="rarityLevel">-</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">能量值</span>
            <span class="stat-value" id="energyLevel">100%</span>
        </div>
    </div>

    <!-- 控制面板 -->
    <div class="control-panel">
        <div class="mode-selector">
            <button class="mode-btn active" data-mode="normal">标准模式</button>
            <button class="mode-btn" data-mode="turbo">极速模式</button>
            <button class="mode-btn" data-mode="mystery">神秘模式</button>
        </div>
        <button class="main-btn" id="startBtn">启动选秀程序</button>
    </div>

    <!-- 结果弹窗 -->
    <div class="result-modal" id="resultModal">
        <div class="result-hologram">
            <div class="rarity-badge" id="rarityBadge">SSR</div>
            <div class="result-avatar" id="resultAvatar">🏀</div>
            <div class="result-name" id="resultName">球星名称</div>
            <div class="result-team" id="resultTeam">球队名称</div>
            <div class="result-stats">
                <div class="stat-box">
                    <div class="stat-number" id="stat1">99</div>
                    <div class="stat-text">综合评分</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="stat2">S</div>
                    <div class="stat-text">稀有度</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="stat3">A+</div>
                    <div class="stat-text">潜力值</div>
                </div>
            </div>
            <button class="close-btn" id="closeBtn">确认收录</button>
        </div>
    </div>

    <script>
        // 球星数据库 - 增加更多球星和稀有度系统
        const players = [
            { name: "勒布朗·詹姆斯", team: "洛杉矶湖人", emoji: "👑", rarity: "SSR", stats: [98, "S+", "A+"], desc: "小皇帝" },
            { name: "斯蒂芬·库里", team: "金州勇士", emoji: "🎯", rarity: "SSR", stats: [96, "S+", "A"], desc: "三分之神" },
            { name: "凯文·杜兰特", team: "菲尼克斯太阳", emoji: "🐍", rarity: "SSR", stats: [96, "S", "A"], desc: "死神" },
            { name: "扬尼斯·阿德托昆博", team: "密尔沃基雄鹿", emoji: "🦌", rarity: "SSR", stats: [97, "S+", "A+"], desc: "希腊怪兽" },
            { name: "尼古拉·约基奇", team: "丹佛掘金", emoji: "🃏", rarity: "SSR", stats: [97, "S+", "A+"], desc: "小丑" },
            { name: "卢卡·东契奇", team: "达拉斯独行侠", emoji: "✨", rarity: "SSR", stats: [95, "S", "A+"], desc: "神奇小子" },
            { name: "乔尔·恩比德", team: "费城76人", emoji: "🔔", rarity: "SSR", stats: [94, "S", "A"], desc: "过程" },
            { name: "杰森·塔图姆", team: "波士顿凯尔特人", emoji: "☘️", rarity: "SSR", stats: [93, "S", "A+"], desc: "JT" },
            { name: "谢伊·吉尔杰斯-亚历山大", team: "俄克拉荷马雷霆", emoji: "⚡", rarity: "SR", stats: [92, "A+", "A+"], desc: "SGA" },
            { name: "安东尼·爱德华兹", team: "明尼苏达森林狼", emoji: "🐺", rarity: "SR", stats: [91, "A+", "S"], desc: "蚁人" },
            { name: "维克托·文班亚马", team: "圣安东尼奥马刺", emoji: "🦋", rarity: "UR", stats: [90, "S", "S+"], desc: "外星人" },
            { name: "多诺万·米切尔", team: "克利夫兰骑士", emoji: "🕷️", rarity: "SR", stats: [91, "A+", "A"], desc: "蜘蛛侠" }
        ];

        let isRunning = false;
        let currentMode = 'normal';
        let selectedCount = 0;
        let cards = [];
        let animationId = null;

        // 初始化星空
        function initStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                star.style.opacity = Math.random();
                starsContainer.appendChild(star);
            }
        }

        // 初始化卡片轨道
        function initCards() {
            const orbit = document.getElementById('cardsOrbit');
            orbit.innerHTML = '';
            cards = [];

            const radius = 225;
            const angleStep = (2 * Math.PI) / players.length;

            players.forEach((player, index) => {
                const card = document.createElement('div');
                card.className = 'player-card';
                card.dataset.index = index;

                const angle = angleStep * index - Math.PI / 2;
                const x = Math.cos(angle) * radius;
                const y = Math.sin(angle) * radius;

                card.style.left = `calc(50% + ${x}px - 70px)`;
                card.style.top = `calc(50% + ${y}px - 90px)`;

                card.innerHTML = `
                    <div class="card-number">${String(index + 1).padStart(2, '0')}</div>
                    <div class="card-holo">${player.emoji}</div>
                    <div class="card-name">${player.name}</div>
                    <div class="card-team">${player.team}</div>
                `;

                orbit.appendChild(card);
                cards.push(card);
            });
        }

        // 矩阵雨效果
        function initMatrixRain() {
            const canvas = document.getElementById('matrixRain');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const chars = '0123456789ABCDEF';
            const fontSize = 14;
            const columns = canvas.width / fontSize;
            const drops = [];

            for (let i = 0; i < columns; i++) {
                drops[i] = 1;
            }

            function draw() {
                if (!canvas.classList.contains('active')) {
                    requestAnimationFrame(draw);
                    return;
                }

                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#00d4ff';
                ctx.font = fontSize + 'px monospace';

                for (let i = 0; i < drops.length; i++) {
                    const text = chars[Math.floor(Math.random() * chars.length)];
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }

                requestAnimationFrame(draw);
            }

            draw();
        }

        // 选择动画
        async function startSelection() {
            if (isRunning) return;
            isRunning = true;

            const btn = document.getElementById('startBtn');
            const systemStatus = document.getElementById('systemStatus');
            const scanProgress = document.getElementById('scanProgress');
            const progressFill = document.getElementById('progressFill');
            const matrixRain = document.getElementById('matrixRain');
            const scanner = document.getElementById('scanner');

            btn.disabled = true;
            btn.classList.add('scanning');
            btn.textContent = '扫描中...';
            systemStatus.textContent = '正在分析...';
            matrixRain.classList.add('active');

            // 重置卡片
            cards.forEach(card => {
                card.classList.remove('active', 'selected');
                card.style.opacity = '0.5';
            });

            // 根据模式设置参数
            let rounds, baseDelay, speedCurve;
            switch(currentMode) {
                case 'turbo':
                    rounds = 2;
                    baseDelay = 30;
                    speedCurve = 'linear';
                    break;
                case 'mystery':
                    rounds = 5;
                    baseDelay = 80;
                    speedCurve = 'random';
                    break;
                default:
                    rounds = 3;
                    baseDelay = 60;
                    speedCurve = 'easeOut';
            }

            const totalSteps = rounds * players.length;
            const finalIndex = Math.floor(Math.random() * players.length);
            const actualSteps = totalSteps + finalIndex;

            let currentIndex = 0;

            for (let step = 0; step < actualSteps; step++) {
                cards.forEach(card => card.classList.remove('active'));

                currentIndex = step % players.length;
                cards[currentIndex].classList.add('active');
                cards[currentIndex].style.opacity = '1';

                // 更新进度
                const progress = Math.floor((step / actualSteps) * 100);
                scanProgress.textContent = progress + '%';
                progressFill.style.width = progress + '%';

                // 随机触发扫描特效
                if (Math.random() > 0.7) {
                    scanner.classList.remove('active');
                    void scanner.offsetWidth;
                    scanner.classList.add('active');
                }

                // 计算延迟
                let delay;
                if (speedCurve === 'random') {
                    delay = baseDelay + Math.random() * 100;
                } else if (speedCurve === 'easeOut') {
                    const progress = step / actualSteps;
                    delay = baseDelay + (300 - baseDelay) * Math.pow(progress, 2);
                } else {
                    delay = baseDelay;
                }

                await sleep(delay);
            }

            // 选中结果
            cards.forEach(card => {
                card.classList.remove('active');
                card.style.opacity = '0.3';
            });
            cards[finalIndex].classList.add('selected');
            cards[finalIndex].style.opacity = '1';

            // 能量爆发特效
            document.getElementById('energyBurst').classList.add('active');

            // 更新系统状态
            systemStatus.textContent = '分析完成';
            scanProgress.textContent = '100%';
            progressFill.style.width = '100%';

            await sleep(1000);

            // 显示结果
            showResult(players[finalIndex]);

            // 清理
            matrixRain.classList.remove('active');
            btn.classList.remove('scanning');
            btn.textContent = '启动选秀程序';
            document.getElementById('energyBurst').classList.remove('active');
        }

        function showResult(player) {
            const modal = document.getElementById('resultModal');
            const avatar = document.getElementById('resultAvatar');
            const name = document.getElementById('resultName');
            const team = document.getElementById('resultTeam');
            const badge = document.getElementById('rarityBadge');

            avatar.textContent = player.emoji;
            name.textContent = player.name;
            team.textContent = player.team + ' | ' + player.desc;
            badge.textContent = player.rarity;

            document.getElementById('stat1').textContent = player.stats[0];
            document.getElementById('stat2').textContent = player.stats[1];
            document.getElementById('stat3').textContent = player.stats[2];

            // 根据稀有度设置颜色
            const colors = {
                'UR': '#ff006e',
                'SSR': '#ffd700',
                'SR': '#00d4ff',
                'R': '#a0a0a0'
            };
            badge.style.background = `linear-gradient(135deg, ${colors[player.rarity]}, ${colors[player.rarity]}aa)`;

            modal.classList.add('show');

            // 更新统计
            selectedCount++;
            document.getElementById('selectedCount').textContent = selectedCount;
            document.getElementById('rarityLevel').textContent = player.rarity;
        }

        function closeResult() {
            document.getElementById('resultModal').classList.remove('show');
            cards.forEach(card => {
                card.classList.remove('selected');
                card.style.opacity = '1';
            });

            document.getElementById('systemStatus').textContent = '待机中';
            document.getElementById('scanProgress').textContent = '0%';
            document.getElementById('progressFill').style.width = '0%';

            isRunning = false;
            document.getElementById('startBtn').disabled = false;
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // 模式切换
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentMode = this.dataset.mode;
            });
        });

        // 事件监听
        document.getElementById('startBtn').addEventListener('click', startSelection);
        document.getElementById('closeBtn').addEventListener('click', closeResult);

        // 初始化
        initStars();
        initCards();
        initMatrixRain();

        // 窗口调整
        window.addEventListener('resize', () => {
            initCards();
            const canvas = document.getElementById('matrixRain');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
