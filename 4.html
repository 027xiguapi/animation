		function init () {

			camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);

			camera.position.set(0, 30, 100);

			const textureLoader = new THREE.TextureLoader();
			textureLoader.load('img/tk.jpg', function(texture) {
				// 使用 CSS background-size: cover 类似的逻辑
				const imgAspect = texture.image.width / texture.image.height;
				const windowAspect = window.innerWidth / window.innerHeight;
				
				let scale, offsetX, offsetY;
				
				if (windowAspect > imgAspect) {
					// 窗口更宽，按高度适配（图片撑满高度，宽度超出）
					scale = windowAspect / imgAspect;
					offsetX = 0;
					offsetY = 0;
				} else {
					// 窗口更高，按宽度适配（图片撑满宽度，高度超出）
					scale = imgAspect / windowAspect;
					offsetX = 0;
					offsetY = 0;
				}
				
				texture.repeat.set(1 / scale, 1 / scale);
				
				if (windowAspect > imgAspect) {
					texture.offset.x = (scale - 1) / 2;
				} else {
					texture.offset.y = (scale - 1) / 2;
				}
				
				scene.background = texture;
			});

			ground.material.map.colorSpace = THREE.SRGBColorSpace;

		function createEiffelTower () {
			const loader = new GLTFLoader();

			// 计算铁塔位置（在最左边柱子的左侧）
			const totalWidth = (metroCitiesData.length - 1) * CONFIG.linearSpacing;
			const leftmostBarX = -totalWidth / 2;
			const towerX = leftmostBarX - CONFIG.linearSpacing * 1.5; // 在最左边再往左一些

			loader.load('model/pioche.glb', function (gltf) {
				const model = gltf.scene;

				// 设置模型位置
				model.position.set(towerX, 0, 0);

				// 可以调整模型的缩放比例
				model.scale.set(5, 5, 5); // 根据实际模型大小调整

				// 启用阴影
				model.traverse(function (node) {
					if (node.isMesh) {
						node.castShadow = true;
						node.receiveShadow = true;
					}
				});

				scene.add(model);

				// 获取模型的边界框来计算高度
				const box = new THREE.Box3().setFromObject(model);
				const height = box.max.y - box.min.y;

				eiffelTower = {
					group: model,
					height: height,
					x: towerX,
					z: 0,
				};

				console.log('铁塔模型加载成功，高度:', height);
			}, function (xhr) {
				console.log((xhr.loaded / xhr.total * 100) + '% 已加载');
			}, function (error) {
				console.error('加载铁塔模型时出错:', error);
			});
		}

		function createBars () {
			// 先按GDP从小到大排序
			metroCitiesData.sort((a, b) => a.gdp - b.gdp);
			
			const maxGDP = metroCitiesData[metroCitiesData.length - 1].gdp;
			const totalWidth = (metroCitiesData.length - 1) * CONFIG.linearSpacing;

			metroCitiesData.forEach((city, index) => {
				const height = (city.gdp / maxGDP) * CONFIG.maxHeight;
				// 线性排列：从左到右
				const x = index * CONFIG.linearSpacing - totalWidth / 2;
				const z = 0;  // 所有柱子在同一条线上

				const geometry = new THREE.BoxGeometry(CONFIG.baseWidth, height, CONFIG.baseWidth);
				geometry.translate(0, height / 2, 0);

				const material = new THREE.MeshPhysicalMaterial({
					color: city.color,
					metalness: 0.1,
					roughness: 0.1,
					thickness: 1,
					clearcoat: 1,
					clearcoatRoughness: 0.1,
					emissive: city.color,
					emissiveIntensity: 0.2
				});

				const bar = new THREE.Mesh(geometry, material);
				bar.position.set(x, 0, z);
				bar.castShadow = true;
				bar.receiveShadow = true;

				bar.userData = {
					city: city.name,
					gdp: city.gdp,
					targetHeight: height,
					rank: city.rank,
					color: city.color,
					x: x,
					z: z,
					index: index
				};

				scene.add(bar);
				bars.push(bar);

				// 保存引用以便后续动画
				createLabel(city, x, z, height);
			});
		}

		function createLabel (city, x, z, height) {
			const canvas = document.createElement('canvas');
			canvas.width = 512;
			canvas.height = 640;
			const ctx = canvas.getContext('2d');

			// 清除 Canvas 背景，确保其完全透明
			ctx.clearRect(0, 0, canvas.width, canvas.height);

			// 加载并绘制城市图标
			const icon = new Image();
			icon.crossOrigin = 'anonymous';
			icon.onload = function() {
				// 绘制圆形图标
				const iconSize = 120;
				const iconX = canvas.width / 2;
				const iconY = 100;

				ctx.save();
				ctx.beginPath();
				ctx.arc(iconX, iconY, iconSize / 2, 0, Math.PI * 2);
				ctx.closePath();
				ctx.clip();
				ctx.drawImage(icon, iconX - iconSize / 2, iconY - iconSize / 2, iconSize, iconSize);
				ctx.restore();

				// 绘制图标边框
				ctx.strokeStyle = '#ffffff';
				ctx.lineWidth = 4;
				ctx.beginPath();
				ctx.arc(iconX, iconY, iconSize / 2, 0, Math.PI * 2);
				ctx.stroke();

				// 更新纹理
				texture.needsUpdate = true;
			};
			icon.src = city.iconSrc;

			// 绘制文字（带阴影）
			ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
			ctx.shadowBlur = 10;

			// 城市名称
			ctx.fillStyle = '#ffffff';
			ctx.font = 'bold 48px Arial';
			ctx.textAlign = 'center';
			ctx.fillText(city.name, canvas.width / 2, 220);

			// "GDP" 标签
			ctx.fillStyle = '#ffd700';
			ctx.font = 'bold 36px Arial';
			ctx.fillText('GDP', canvas.width / 2, 280);

			// GDP 数值
			ctx.fillStyle = '#ffd700';
			ctx.font = 'bold 72px Arial';
			ctx.fillText(`${(city.gdp / 10000).toFixed(2)}万亿`, canvas.width / 2, 380);

			// 底部排名
			ctx.fillStyle = '#ffffff';
			ctx.font = 'bold 48px Arial';
			ctx.fillText(`#${city.rank}`, canvas.width / 2, 520);

			const texture = new THREE.CanvasTexture(canvas);
			texture.needsUpdate = true;

			const panelWidth = CONFIG.baseWidth * 1.5;
			const panelHeight = 7.5;

			const panelGeometry = new THREE.PlaneGeometry(panelWidth, panelHeight);

			const panelMaterial = new THREE.MeshBasicMaterial({
				map: texture,
				transparent: true,
				alphaTest: 0.1,
				side: THREE.DoubleSide
			});

			const panel = new THREE.Mesh(panelGeometry, panelMaterial);

			panel.position.set(x, height - panelHeight / 2, z + CONFIG.baseWidth / 2 + 0.1);

			scene.add(panel);

			labels.push({
				mesh: panel,
				position: new THREE.Vector3(x, height - panelHeight / 2, z + CONFIG.baseWidth / 2 + 0.1),
				basePosition: new THREE.Vector3(x, 0, z)
			});
		}

		async function startClimbing () {
			if (isAnimating) return;

			// 等待铁塔模型加载完成
			if (!eiffelTower) {
				console.log('等待铁塔模型加载...');
				await new Promise(resolve => {
					const checkInterval = setInterval(() => {
						if (eiffelTower) {
							clearInterval(checkInterval);
							resolve();
						}
					}, 100);
					// 超时保护：5秒后强制继续
					setTimeout(() => {
						clearInterval(checkInterval);
						resolve();
					}, 5000);
				});
			}

			isAnimating = true;
			document.getElementById('startBtn').disabled = true;
			
			// 隐藏控制按钮
			document.getElementById('controls').style.display = 'none';

			// 设置初始相机位置（从埃菲尔铁塔开始）
			const initialZ = 15; // 固定的Z位置（正前方）
			const towerViewHeight = eiffelTower ? eiffelTower.height * 0.6 : 15;
			camera.position.set(eiffelTower.x, towerViewHeight, initialZ);

			// 更新 cameraTarget 为埃菲尔铁塔的位置
			cameraTarget.set(eiffelTower.x, towerViewHeight, eiffelTower.z);
			camera.lookAt(cameraTarget);

			// 在铁塔处停留一下
			await new Promise(resolve => setTimeout(resolve, 1500));

			// 依次遍历每个柱子
			for (let i = 0; i < bars.length; i++) {
				currentBarIndex = i;
				const bar = bars[i];
				const targetHeight = bar.userData.targetHeight;

				// 生长柱子
				// growBar(i);

				// 镜头只进行水平和垂直移动，保持Z位置不变
				await new Promise(resolve => {
					// 同时动画相机位置和目标点
					gsap.to(camera.position, {
						x: bar.userData.x,
						y: targetHeight,
						duration: CONFIG.climbDuration,
						ease: "power2.inOut",
						onComplete: resolve
					});

					// 让 cameraTarget 也跟随动画，始终看向柱子顶部
					gsap.to(cameraTarget, {
						x: bar.userData.x,
						y: targetHeight,
						z: bar.userData.z,
						duration: CONFIG.climbDuration,
						ease: "power2.inOut"
					});
				});

				// 短暂停留
				await new Promise(resolve => setTimeout(resolve, 500));
			}

			// 完成后稍微拉远镜头，展示全景
			await new Promise(resolve => {
				gsap.to(camera.position, {
					x: 0,
					y: CONFIG.maxHeight + 10,
					z: 50,
					duration: 2,
					ease: "power2.out",
					onUpdate: () => {
						camera.lookAt(0, CONFIG.maxHeight / 2, 0);
					},
					onComplete: () => {
						controls.enabled = true;
						// 重新显示控制按钮
						document.getElementById('controls').style.display = 'flex';
						document.getElementById('startBtn').disabled = false;
						isAnimating = false;
						resolve();
					}
				});
			});

		}

		function skipToTop() {
			if (isAnimating) return;
			
			// 隐藏控制按钮
			document.getElementById('controls').style.display = 'none';
			
			// 直接跳到最高点
			const maxHeight = CONFIG.maxHeight;
			gsap.to(camera.position, {
				x: 0,
				y: maxHeight + 10,
				z: 50,
				duration: 1,
				ease: "power2.out",
				onUpdate: () => {
					camera.lookAt(0, maxHeight / 2, 0);
				},
				onComplete: () => {
					cameraControls.enabled = true;
					// 重新显示控制按钮
					document.getElementById('controls').style.display = 'flex';
				}
			});
		}

		function resetView() {
			// 重置相机位置
			gsap.to(camera.position, {
				x: 0,
				y: 30,
				z: 100,
				duration: 1,
				ease: "power2.out",
				onComplete: () => {
					cameraControls.target.set(0, 15, 0);
					cameraControls.update();
					cameraControls.enabled = false;
					// 重新启用开始按钮
					document.getElementById('startBtn').disabled = false;
					isAnimating = false;
					// 确保控制按钮显示
					document.getElementById('controls').style.display = 'flex';
				}
			});
		}

		// EVENT HANDLERS

		function onWindowResize () {

			SCREEN_WIDTH = window.innerWidth;
			SCREEN_HEIGHT = window.innerHeight;

			renderer.setSize(SCREEN_WIDTH, SCREEN_HEIGHT);

			camera.aspect = SCREEN_WIDTH / SCREEN_HEIGHT;
			camera.updateProjectionMatrix();

		}


		function animate () {

			render();

			stats.update();

		}

		function render () {

			const delta = clock.getDelta();

			renderer.render(scene, camera);

		}

		window.startClimbing = startClimbing;
		window.skipToTop = skipToTop;
		window.resetView = resetView;
	</script>

</body>

</html>
