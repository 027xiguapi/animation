<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025年城市GDP - 垂直攀升运镜</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #fff;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        .hide {
            display: none!important;
        }
        #container {
            width: 100vw;
            height: 100vh;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }
        .stage-text {
            position: absolute;
            left: 50%;
            top: 8%;
            transform: translateX(-50%);
            color: white;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(0,212,255,0.8);
            opacity: 0;
            transition: opacity 0.5s;
            text-align: center;
            background: linear-gradient(45deg, #fff, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stage-subtitle {
            font-size: 18px;
            color: #aaa;
            margin-top: 8px;
            text-shadow: none;
            -webkit-text-fill-color: #aaa;
            background: none;
        }
        #controls {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            pointer-events: auto;
            display: flex;
            gap: 15px;
            z-index: 100;
        }
        #camera-controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(0,212,255,0.5);
            border-radius: 10px;
            padding: 15px;
            color: white;
            font-size: 12px;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            z-index: 100;
            min-width: 250px;
        }
        #camera-controls h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #00d4ff;
        }
        .control-group {
            margin-bottom: 10px;
        }
        .control-group label {
            display: block;
            margin-bottom: 3px;
            font-size: 11px;
            color: #aaa;
        }
        .control-group input[type="range"] {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            outline: none;
            border-radius: 2px;
        }
        .control-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            background: #00d4ff;
            cursor: pointer;
            border-radius: 50%;
        }
        .control-group input[type="range"]::-moz-range-thumb {
            width: 12px;
            height: 12px;
            background: #00d4ff;
            cursor: pointer;
            border-radius: 50%;
            border: none;
        }
        .control-group .value-display {
            display: inline-block;
            float: right;
            color: #00d4ff;
            font-weight: bold;
        }
        .toggle-btn {
            background: rgba(0,212,255,0.2);
            border: 1px solid #00d4ff;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            margin-top: 5px;
            width: 100%;
        }
        .toggle-btn:hover {
            background: rgba(0,212,255,0.4);
        }
        button {
            padding: 12px 30px;
            font-size: 16px;
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(0,212,255,0.5);
            border-radius: 25px;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover {
            background: rgba(0,212,255,0.2);
            border-color: #00d4ff;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0,212,255,0.3);
        }
        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <div id="ui-layer">
        <!-- 相机控制面板 -->
        <div id="camera-controls" class="hide">
            <h3>📷 相机控制</h3>
            <div class="control-group">
                <label>X 位置 <span class="value-display" id="camX">0</span></label>
                <input type="range" id="camXSlider" min="-100" max="100" value="0" step="0.5">
            </div>
            <div class="control-group">
                <label>Y 位置 <span class="value-display" id="camY">0</span></label>
                <input type="range" id="camYSlider" min="-10" max="100" value="1" step="0.5">
            </div>
            <div class="control-group">
                <label>Z 位置 <span class="value-display" id="camZ">0</span></label>
                <input type="range" id="camZSlider" min="-100" max="100" value="15" step="0.5">
            </div>
            <div class="control-group">
                <label>目标 X <span class="value-display" id="targetX">0</span></label>
                <input type="range" id="targetXSlider" min="-50" max="50" value="0" step="0.5">
            </div>
            <div class="control-group">
                <label>目标 Y <span class="value-display" id="targetY">0</span></label>
                <input type="range" id="targetYSlider" min="-10" max="50" value="0" step="0.5">
            </div>
            <div class="control-group">
                <label>目标 Z <span class="value-display" id="targetZ">0</span></label>
                <input type="range" id="targetZSlider" min="-50" max="50" value="0" step="0.5">
            </div>
            <button class="toggle-btn" onclick="resetCameraControls()">重置相机</button>
            <button class="toggle-btn" onclick="logCameraPosition()">输出位置到控制台</button>
        </div>

        <div class="stage-text" id="stageText"></div>
            <div id="mainTitle">GDP数据可视化</div>
            <div class="stage-subtitle" id="subTitle">2025年中国城市经济排行</div>
        </div>

        <div id="controls">
            <button id="startBtn" onclick="startClimbing()">▶ 开始攀升</button>
            <button onclick="skipToTop()">⏭ 直达顶部</button>
            <button onclick="resetView()">↺ 重置</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // 数据 - 按GDP从低到高排序（攀登顺序）
        const cityData = [
            { name: '天津', gdp: 18200, color: 0x8338ec, rank: 10 },
            { name: '南京', gdp: 19800, color: 0xffbe0b, rank: 9 },
            { name: '武汉', gdp: 21500, color: 0xfb5607, rank: 8 },
            { name: '杭州', gdp: 22100, color: 0x06ffa5, rank: 7 },
            { name: '成都', gdp: 24800, color: 0x3a86ff, rank: 6 },
            { name: '重庆', gdp: 31500, color: 0xff006e, rank: 5 },
            { name: '广州', gdp: 32800, color: 0x8338ec, rank: 4 },
            { name: '深圳', gdp: 38500, color: 0xffbe0b, rank: 3 },
            { name: '北京', gdp: 49800, color: 0xfb5607, rank: 2 },
            { name: '上海', gdp: 52000, color: 0x00d4ff, rank: 1 }
        ];

        let scene, camera, renderer, controls;
        let bars = [];
        let labels = [];
        let isAnimating = false;
        let currentBarIndex = -1;
        let cityInfoOffset = { x: 0, y: -120 }; // 相对于柱子顶部的偏移（像素）
        let manualCameraControl = false;
        let cameraTarget = new THREE.Vector3(0, 0, 0);
        let eiffelTower = null; // 埃菲尔铁塔模型

        const CONFIG = {
            maxHeight: 30,
            baseWidth: 4,
            spacing: 8,
            climbDuration: 3,
            spiralRadius: 12,
            linearSpacing: 6  // 线性排列的间距（改近一些）
        };

        function init() {
            scene = new THREE.Scene();
            
            // 白天场景 - 白色背景
            scene.background = new THREE.Color(0xffffff);
            
            // 白天雾效
            scene.fog = new THREE.Fog(0xffffff, 1000, 4000);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.getElementById('container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.enabled = false;

            setupLighting();
            createEnvironment();
            createEiffelTower(); // 创建埃菲尔铁塔
            createBars();
            setupCameraControls();
            
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function createSkyBackground() {
            // 创建天空盒 - 渐变的蓝天
            const skyGeometry = new THREE.SphereGeometry(500, 32, 32);
            const skyMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    topColor: { value: new THREE.Color(0x0077be) }, // 深蓝色（天空顶部）
                    bottomColor: { value: new THREE.Color(0x87ceeb) }, // 天蓝色（地平线）
                    offset: { value: 33 },
                    exponent: { value: 0.6 }
                },
                vertexShader: `
                    varying vec3 vWorldPosition;
                    void main() {
                        vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                        vWorldPosition = worldPosition.xyz;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 topColor;
                    uniform vec3 bottomColor;
                    uniform float offset;
                    uniform float exponent;
                    varying vec3 vWorldPosition;
                    void main() {
                        float h = normalize(vWorldPosition + offset).y;
                        gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h, 0.0), exponent), 0.0)), 1.0);
                    }
                `,
                side: THREE.BackSide
            });
            const sky = new THREE.Mesh(skyGeometry, skyMaterial);
            scene.add(sky);

            // 创建白云
            createClouds();
        }

        function createClouds() {
            const cloudGroup = new THREE.Group();
            
            // 创建多个云朵
            for (let i = 0; i < 20; i++) {
                const cloud = new THREE.Group();
                
                // 每朵云由多个球体组成
                const numPuffs = 3 + Math.floor(Math.random() * 3);
                for (let j = 0; j < numPuffs; j++) {
                    const puffGeometry = new THREE.SphereGeometry(
                        3 + Math.random() * 4, // 随机大小
                        8,
                        8
                    );
                    const puffMaterial = new THREE.MeshStandardMaterial({
                        color: 0xffffff,
                        transparent: true,
                        opacity: 0.8,
                        roughness: 1,
                        metalness: 0
                    });
                    const puff = new THREE.Mesh(puffGeometry, puffMaterial);
                    
                    // 随机位置组成云朵形状
                    puff.position.set(
                        (Math.random() - 0.5) * 8,
                        (Math.random() - 0.5) * 2,
                        (Math.random() - 0.5) * 4
                    );
                    cloud.add(puff);
                }
                
                // 云朵的位置（分散在天空中）
                cloud.position.set(
                    (Math.random() - 0.5) * 300,
                    30 + Math.random() * 50,
                    (Math.random() - 0.5) * 300
                );
                
                // 随机缩放
                const scale = 0.5 + Math.random() * 1;
                cloud.scale.set(scale, scale, scale);
                
                cloudGroup.add(cloud);
            }
            
            scene.add(cloudGroup);
            
            // 让云朵缓慢移动
            function animateClouds() {
                cloudGroup.children.forEach((cloud, index) => {
                    cloud.position.x += 0.01;
                    // 如果云朵移出边界，重置位置
                    if (cloud.position.x > 150) {
                        cloud.position.x = -150;
                    }
                });
            }
            
            // 将动画函数添加到主动画循环
            const originalAnimate = window.animate;
            window.animate = function() {
                animateClouds();
                if (originalAnimate) originalAnimate();
            };
        }

        function setupLighting() {
            // 白天环境光
            const ambient = new THREE.AmbientLight(0x666666, 3);
            scene.add(ambient);

            // 白天太阳光（方向光）
            const directionalLight = new THREE.DirectionalLight(0xffffff, 7);
            directionalLight.position.set(200, 450, 500);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 1024;
            directionalLight.shadow.mapSize.height = 512;
            directionalLight.shadow.camera.near = 100;
            directionalLight.shadow.camera.far = 1200;
            directionalLight.shadow.camera.left = -1000;
            directionalLight.shadow.camera.right = 1000;
            directionalLight.shadow.camera.top = 350;
            directionalLight.shadow.camera.bottom = -350;
            scene.add(directionalLight);
            window.mainLight = directionalLight;
        }

        function createEnvironment() {
            // 创建草地地面
            const gt = new THREE.TextureLoader().load('img/grasslight-big.jpg');
            const gg = new THREE.PlaneGeometry(16000, 16000);
            const gm = new THREE.MeshPhongMaterial({ color: 0xffffff, map: gt });
            const ground = new THREE.Mesh(gg, gm);
            ground.rotation.x = -Math.PI / 2;
            ground.material.map.repeat.set(64, 64);
            ground.material.map.wrapS = THREE.RepeatWrapping;
            ground.material.map.wrapT = THREE.RepeatWrapping;
            ground.material.map.colorSpace = THREE.SRGBColorSpace;
            // note that because the ground does not cast a shadow, .castShadow is left false
            ground.receiveShadow = true;
            scene.add(ground);
        }

        function createEiffelTower() {
            const loader = new THREE.GLTFLoader();
            
            // 计算铁塔位置（在最左边柱子的左侧）
            const totalWidth = (cityData.length - 1) * CONFIG.linearSpacing;
            const leftmostBarX = -totalWidth / 2;
            const towerX = leftmostBarX - CONFIG.linearSpacing * 1.5; // 在最左边再往左一些
            
            loader.load('model/pioche.glb', function(gltf) {
                const model = gltf.scene;
                
                // 设置模型位置
                model.position.set(towerX, 0, 0);
                
                // 可以调整模型的缩放比例
                model.scale.set(5, 5, 5); // 根据实际模型大小调整
                
                // 启用阴影
                model.traverse(function(node) {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });
                
                scene.add(model);
                
                // 获取模型的边界框来计算高度
                const box = new THREE.Box3().setFromObject(model);
                const height = box.max.y - box.min.y;
                
                // 在铁塔顶部添加聚光灯
                const towerLight = new THREE.SpotLight(0xffd700, 2); // 金色光
                towerLight.position.set(towerX, height, 0);
                towerLight.angle = Math.PI / 4;
                towerLight.penumbra = 0.3;
                towerLight.decay = 2;
                towerLight.distance = 50;
                towerLight.castShadow = true;
                towerLight.shadow.mapSize.width = 1024;
                towerLight.shadow.mapSize.height = 1024;
                scene.add(towerLight);
                
                // 添加点光源（发光效果）
                const pointLight = new THREE.PointLight(0xffd700, 1.5, 30);
                pointLight.position.set(towerX, height, 0);
                scene.add(pointLight);
                
                // 添加一个发光的小球体作为灯泡视觉效果
                const lightBulbGeometry = new THREE.SphereGeometry(0.3, 16, 16);
                const lightBulbMaterial = new THREE.MeshBasicMaterial({
                    color: 0xffd700,
                    emissive: 0xffd700,
                    emissiveIntensity: 2
                });
                const lightBulb = new THREE.Mesh(lightBulbGeometry, lightBulbMaterial);
                lightBulb.position.set(towerX, height, 0);
                scene.add(lightBulb);
                
                eiffelTower = {
                    group: model,
                    height: height,
                    x: towerX,
                    z: 0,
                    light: towerLight,
                    pointLight: pointLight,
                    lightBulb: lightBulb
                };
                
                console.log('铁塔模型加载成功，高度:', height);
            }, function(xhr) {
                console.log((xhr.loaded / xhr.total * 100) + '% 已加载');
            }, function(error) {
                console.error('加载铁塔模型时出错:', error);
            });
        }

        function createBars() {
            const maxGDP = cityData[cityData.length - 1].gdp;
            const totalWidth = (cityData.length - 1) * CONFIG.linearSpacing;
            
            cityData.forEach((city, index) => {
                const height = (city.gdp / maxGDP) * CONFIG.maxHeight;
                // 线性排列：从左到右
                const x = index * CONFIG.linearSpacing - totalWidth / 2;
                const z = 0;  // 所有柱子在同一条线上
                
                const geometry = new THREE.BoxGeometry(CONFIG.baseWidth, height, CONFIG.baseWidth);
                geometry.translate(0, height / 2, 0);
                
                const material = new THREE.MeshPhysicalMaterial({
                    color: city.color,
                    metalness: 0.1,
                    roughness: 0.1,
                    transmission: 0.6,
                    thickness: 1,
                    clearcoat: 1,
                    clearcoatRoughness: 0.1,
                    emissive: city.color,
                    emissiveIntensity: 0.2
                });

                const bar = new THREE.Mesh(geometry, material);
                bar.position.set(x, 0, z);
                bar.castShadow = true;
                bar.receiveShadow = true;

                bar.userData = {
                    city: city.name,
                    gdp: city.gdp,
                    targetHeight: height,
                    rank: city.rank,
                    color: city.color,
                    x: x,
                    z: z,
                    index: index
                };

                scene.add(bar);
                bars.push(bar);
                
                // 保存引用以便后续动画
                createLabel(city, x, z, height);
            });
        }

        function createLabel(city, x, z, height) {
            // 创建 Canvas 纹理来显示文字信息
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 640;
            const ctx = canvas.getContext('2d');
            
            // 城市名称（白色，在彩色标题栏中）
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 64px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(city.name, canvas.width / 2, 85);
            
            // "GDP" 标签（黄色）
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 42px Arial';
            ctx.fillText('GDP', canvas.width / 2, 220);
            
            // GDP 数值（大号黄色）
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 96px Arial';
            ctx.fillText(`${(city.gdp/10000).toFixed(2)}万亿`, canvas.width / 2, 360);
            
            // 底部排名（白色，小号）
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 48px Arial';
            ctx.fillText(`#${city.rank}`, canvas.width / 2, 520);
            
            // 创建纹理
            const texture = new THREE.CanvasTexture(canvas);
            texture.needsUpdate = true;
            
            // 创建平面面板（贴在柱子前面）
            const panelWidth = CONFIG.baseWidth * 0.95; // 略小于柱子宽度
            const panelHeight = 7.5;
            
            const panelGeometry = new THREE.PlaneGeometry(panelWidth, panelHeight);
            const panelMaterial = new THREE.MeshStandardMaterial({
                map: texture,
                metalness: 0.1,
                roughness: 0.3,
                side: THREE.DoubleSide
            });
            
            const panel = new THREE.Mesh(panelGeometry, panelMaterial);
            // 将面板放在柱子前面，高度在柱子顶部附近
            panel.position.set(x, height - panelHeight / 2, z + CONFIG.baseWidth / 2 + 0.01);
            panel.castShadow = true;
            panel.receiveShadow = true;
            
            scene.add(panel);
            
            // 保存引用
            labels.push({
                mesh: panel,
                position: new THREE.Vector3(x, height - panelHeight / 2, z + CONFIG.baseWidth / 2 + 0.01),
                basePosition: new THREE.Vector3(x, 0, z)
            });
        }

        async function startClimbing() {
            if(isAnimating) return;
            
            // 等待铁塔模型加载完成
            if (!eiffelTower) {
                console.log('等待铁塔模型加载...');
                await new Promise(resolve => {
                    const checkInterval = setInterval(() => {
                        if (eiffelTower) {
                            clearInterval(checkInterval);
                            resolve();
                        }
                    }, 100);
                    // 超时保护：5秒后强制继续
                    setTimeout(() => {
                        clearInterval(checkInterval);
                        resolve();
                    }, 5000);
                });
            }
            
            isAnimating = true;
            document.getElementById('startBtn').disabled = true;
            
            // 显示UI元素
            document.getElementById('stageText').style.opacity = '1';
            
            // 更新标题
            document.getElementById('mainTitle').textContent = '开始攀升';
            document.getElementById('subTitle').textContent = '从埃菲尔铁塔出发，展示城市GDP';
            
            // 设置初始相机位置（从埃菲尔铁塔开始）
            const initialZ = 15; // 固定的Z位置（正前方）
            const towerViewHeight = eiffelTower ? eiffelTower.height * 0.6 : 15;
            camera.position.set(eiffelTower.x, towerViewHeight, initialZ);
            
            // 更新 cameraTarget 为埃菲尔铁塔的位置
            cameraTarget.set(eiffelTower.x, towerViewHeight, eiffelTower.z);
            camera.lookAt(cameraTarget);
            
            // 在铁塔处停留一下
            await new Promise(resolve => setTimeout(resolve, 1500));
            
            // 依次遍历每个柱子
            for (let i = 0; i < bars.length; i++) {
                currentBarIndex = i;
                const bar = bars[i];
                const targetHeight = bar.userData.targetHeight;
                
                // 生长柱子
                // growBar(i);
                
                // 镜头只进行水平和垂直移动，保持Z位置不变
                await new Promise(resolve => {
                    // 同时动画相机位置和目标点
                    gsap.to(camera.position, {
                        x: bar.userData.x,
                        y: targetHeight,
                        duration: CONFIG.climbDuration,
                        ease: "power2.inOut",
                        onComplete: resolve
                    });
                    
                    // 让 cameraTarget 也跟随动画，始终看向柱子顶部
                    gsap.to(cameraTarget, {
                        x: bar.userData.x,
                        y: targetHeight,
                        z: bar.userData.z,
                        duration: CONFIG.climbDuration,
                        ease: "power2.inOut"
                    });
                });
                
                // 短暂停留
                await new Promise(resolve => setTimeout(resolve, 500));
            }
            
            // 完成后稍微拉远镜头，展示全景
            await new Promise(resolve => {
                gsap.to(camera.position, {
                    x: 0,
                    y: CONFIG.maxHeight + 10,
                    z: 50,
                    duration: 2,
                    ease: "power2.out",
                    onUpdate: () => {
                        camera.lookAt(0, CONFIG.maxHeight / 2, 0);
                    },
                    onComplete: () => {
                        controls.enabled = true;
                        resolve();
                    }
                });
            });
            
            document.getElementById('mainTitle').textContent = '攀升完成';
            document.getElementById('subTitle').textContent = '2025年中国城市GDP排行榜';
        }

        function setupCameraControls() {
            const camXSlider = document.getElementById('camXSlider');
            const camYSlider = document.getElementById('camYSlider');
            const camZSlider = document.getElementById('camZSlider');
            const targetXSlider = document.getElementById('targetXSlider');
            const targetYSlider = document.getElementById('targetYSlider');
            const targetZSlider = document.getElementById('targetZSlider');

            function updateCamera() {
                if (!isAnimating) {
                    camera.position.x = parseFloat(camXSlider.value);
                    camera.position.y = parseFloat(camYSlider.value);
                    camera.position.z = parseFloat(camZSlider.value);
                    
                    cameraTarget.x = parseFloat(targetXSlider.value);
                    cameraTarget.y = parseFloat(targetYSlider.value);
                    cameraTarget.z = parseFloat(targetZSlider.value);
                    
                    camera.lookAt(cameraTarget);
                }
                
                // 更新显示值
                document.getElementById('camX').textContent = camXSlider.value;
                document.getElementById('camY').textContent = camYSlider.value;
                document.getElementById('camZ').textContent = camZSlider.value;
                document.getElementById('targetX').textContent = targetXSlider.value;
                document.getElementById('targetY').textContent = targetYSlider.value;
                document.getElementById('targetZ').textContent = targetZSlider.value;
            }

            camXSlider.addEventListener('input', updateCamera);
            camYSlider.addEventListener('input', updateCamera);
            camZSlider.addEventListener('input', updateCamera);
            targetXSlider.addEventListener('input', updateCamera);
            targetYSlider.addEventListener('input', updateCamera);
            targetZSlider.addEventListener('input', updateCamera);

            // 初始化显示
            updateCamera();
        }

        function resetCameraControls() {
            document.getElementById('camXSlider').value = 0;
            document.getElementById('camYSlider').value = 1;
            document.getElementById('camZSlider').value = 15;
            document.getElementById('targetXSlider').value = 0;
            document.getElementById('targetYSlider').value = 0;
            document.getElementById('targetZSlider').value = 0;
            
            camera.position.set(0, 1, 15);
            cameraTarget.set(0, 0, 0);
            camera.lookAt(cameraTarget);
            
            setupCameraControls();
        }

        function logCameraPosition() {
            console.log('=== 相机位置信息 ===');
            console.log('相机位置:', {
                x: camera.position.x.toFixed(2),
                y: camera.position.y.toFixed(2),
                z: camera.position.z.toFixed(2)
            });
            console.log('目标位置:', {
                x: cameraTarget.x.toFixed(2),
                y: cameraTarget.y.toFixed(2),
                z: cameraTarget.z.toFixed(2)
            });
            console.log('复制代码:');
            console.log(`camera.position.set(${camera.position.x.toFixed(2)}, ${camera.position.y.toFixed(2)}, ${camera.position.z.toFixed(2)});`);
            console.log(`camera.lookAt(${cameraTarget.x.toFixed(2)}, ${cameraTarget.y.toFixed(2)}, ${cameraTarget.z.toFixed(2)});`);
        }

        function growBar(index) {
            const bar = bars[index];
            const targetH = bar.userData.targetHeight;
            
            const newGeo = new THREE.BoxGeometry(CONFIG.baseWidth, targetH, CONFIG.baseWidth);
            newGeo.translate(0, targetH/2, 0);
            
            gsap.to(bar.scale, {
                y: 1,
                duration: 1.5,
                ease: "elastic.out(1, 0.5)",
                onStart: () => {
                    bar.geometry.dispose();
                    bar.geometry = newGeo;
                    gsap.to(bar.material, {
                        emissiveIntensity: 0.8,
                        duration: 0.3,
                        yoyo: true,
                        repeat: 3
                    });
                }
            });

            createParticles(bar.userData.x, targetH, bar.userData.z, bar.userData.color);
        }

        function createParticles(x, y, z, color) {
            const geometry = new THREE.BufferGeometry();
            const count = 50;
            const positions = new Float32Array(count * 3);
            const velocities = [];
            
            for(let i = 0; i < count; i++) {
                positions[i*3] = x;
                positions[i*3+1] = y;
                positions[i*3+2] = z;
                velocities.push({
                    x: (Math.random() - 0.5) * 0.3,
                    y: Math.random() * 0.5,
                    z: (Math.random() - 0.5) * 0.3
                });
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({
                color: color,
                size: 0.2,
                transparent: true,
                blending: THREE.AdditiveBlending
            });
            
            const particles = new THREE.Points(geometry, material);
            scene.add(particles);
            
            let frame = 0;
            function animate() {
                frame++;
                const pos = particles.geometry.attributes.position.array;
                for(let i = 0; i < count; i++) {
                    pos[i*3] += velocities[i].x;
                    pos[i*3+1] += velocities[i].y;
                    pos[i*3+2] += velocities[i].z;
                    velocities[i].y -= 0.01;
                }
                particles.geometry.attributes.position.needsUpdate = true;
                material.opacity -= 0.02;
                
                if(frame < 60) requestAnimationFrame(animate);
                else scene.remove(particles);
            }
            animate();
        }

        function showLabel(index) {
            labels[index].element.classList.add('visible');
        }

        function skipToTop() {
            gsap.killTweensOf(camera.position);
            
            const totalWidth = (cityData.length - 1) * CONFIG.linearSpacing;
            gsap.to(camera.position, {
                x: 0,
                y: 35,
                z: 50,
                duration: 2,
                ease: "power2.out",
                onUpdate: () => camera.lookAt(0, 10, 0),
                onComplete: () => {
                    controls.enabled = true;
                }
            });
        }

        function resetView() {
            gsap.killTweensOf(camera.position);
            controls.enabled = false;
            currentBarIndex = -1;
            
            camera.position.set(0, 1, 15);
            camera.lookAt(0, 0, 0);
            
            document.getElementById('stageText').style.opacity = '0';
            
            isAnimating = false;
            document.getElementById('startBtn').disabled = false;
        }

        function updateLabels() {
            // 更新所有 3D 标签面板
            labels.forEach(lbl => {
                if (lbl.mesh) {
                    // 根据距离调整透明度
                    const dist = camera.position.distanceTo(lbl.position);
                    lbl.mesh.material.opacity = dist < 80 ? 1 : Math.max(0.3, 1 - (dist - 80) / 50);
                    lbl.mesh.material.transparent = true;
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // 如果控制器启用，使用 OrbitControls
            if (controls.enabled) {
                controls.update();
            } else {
                // 否则应用手动相机目标（包括动画期间）
                camera.lookAt(cameraTarget);
            }
            
            updateLabels();
            
            // 旋转所有柱子顶端的立方体
            bars.forEach(bar => {
                if (bar.userData.topCube) {
                    bar.userData.topCube.rotation.y += 0.01;
                    bar.userData.topCube.rotation.x += 0.005;
                }
            });
            
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
